<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Zentri — Learn like it's a game</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="scenes-a.jsx"></script>
<script type="text/babel" src="scenes-b.jsx"></script>
<script type="text/babel" src="scenes-c.jsx"></script>
<script type="text/babel" src="scenes-d.jsx"></script>
<script type="text/babel" src="scenes-e.jsx"></script>
<script type="text/babel" src="scenes-f.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "gameplay": "lighthouse",
  "adaptive": true,
  "tone": "hype"
}/*EDITMODE-END*/;

// Mission intro content keyed by mission kind
const MISSION_STORIES = {
  anatomy: {
    num: '01', title: 'Triangle Anatomy',
    story: 'Every right triangle has three sides — but their names change depending on where you stand. Tap the side the game asks for as you rotate the angle.',
    learns: [
      'Name opposite, adjacent, hypotenuse relative to θ',
      'See how sides change role when the angle moves',
      'Build the muscle memory before ratios arrive',
    ],
  },
  'archer-intro': {
    num: '02', title: 'Ratio Workshop',
    story: 'Meet sin, cos, and tan for the first time — as ratios of sides. Draw the bow, watch the numbers update live.',
    learns: [
      'sin θ = opposite / hypotenuse',
      'cos θ = adjacent / hypotenuse',
      'tan θ = opposite / adjacent',
    ],
  },
  archer: {
    num: '03', title: "Archer's Angle",
    story: "The Dusk Minar holds an old banner. Your bow draws a hypotenuse across the sky. Master sin, cos, tan — hit the banner without ever measuring the rope.",
    learns: [
      'Name the three sides of a right triangle from any angle',
      'Feel sin θ, cos θ, tan θ as the triangle changes',
      'Special angles: 30°, 45°, 60°',
    ],
  },
  angles: {
    num: '04', title: 'Angles Arena',
    story: '30°, 45°, 60° — the magic angles of trigonometry. Each unlocks a perfect ratio. Choose the right angle for the equation on screen.',
    learns: [
      'Memorise sin/cos/tan for 30°, 45°, 60°, 0° and 90°',
      'See the ramp shapes these angles make',
      'Use exact values instantly in any problem',
    ],
  },
  decoder: {
    num: '05', title: 'Ratio Decoder',
    story: "You're given one ratio — say tan A = 4/3. Using Pythagoras, find all the others. Unlock the triangle's full profile from a single clue.",
    learns: [
      'Use Pythagoras to find the missing side',
      'Derive all six ratios from one given ratio',
      'Solve multi-step trig problems with confidence',
    ],
  },
  identity: {
    num: '06', title: 'Identity Forge',
    story: 'On the unit circle, sin²θ + cos²θ is always 1 — no matter what θ is. Spin the angle, watch the identity hold. Then build the other two.',
    learns: [
      'sin²θ + cos²θ = 1 — visualised on the unit circle',
      '1 + tan²θ = sec²θ and 1 + cot²θ = cosec²θ',
      'Identities are permanent — not just memorised',
    ],
  },
  proof: {
    num: '07', title: 'Proof Duel',
    story: "Rearrange the tiles in order to prove the identity. No guessing — each step must follow from the last. This is how a mathematician thinks.",
    learns: [
      'Arrange algebraic steps in correct logical order',
      'Prove trig identities step-by-step',
      'Spot the difference between valid and invalid steps',
    ],
  },
  'boss-trig': {
    num: 'BOSS', title: 'The Dusk Minar',
    story: 'The Minar stands at dusk. Four questions — ratios, identities, angles. Answer them all and the constellation is complete.',
    learns: [
      'Synthesise every Ch 8 concept in one challenge',
      'Any ratio, any angle, any triangle',
      'Exit a master of trigonometry',
    ],
  },
  sight: {
    num: '01', title: 'Line of Sight',
    story: 'Before you can measure heights and distances, you need to see angles clearly. Tilt your gaze up and down — feel the difference between elevation and depression.',
    learns: [
      'Angle of elevation — looking up from horizontal',
      'Angle of depression — looking down from horizontal',
      'Why the two angles are equal (alternate interior angles)',
    ],
  },
  light: {
    num: '02', title: 'Lighthouse',
    story: "Dusk fell. A ship is adrift somewhere on the horizon. You're in the lighthouse. The only measurement you have is how far you lower your eyes to see it.",
    learns: [
      'Angle of depression — what it means and how to sight one',
      'How tan θ turns an angle into a distance',
      'Solving D = H / tan θ from a real scene',
    ],
  },
  lighthouse: {
    num: '02', title: 'Lighthouse',
    story: "Dusk fell. A ship is adrift somewhere on the horizon. You're in the lighthouse. The only measurement you have is how far you lower your eyes to see it.",
    learns: [
      'Angle of depression — what it means and how to sight one',
      'How tan θ turns an angle into a distance',
      'Solving D = H / tan θ from a real scene',
    ],
  },
  flag: {
    num: '03', title: 'Flagstaff on the Tower',
    story: 'A 10 m building flies a flag. From the ground you know two angles of elevation — one to the building top, one to the flag top. Use both triangles to find the flag length.',
    learns: [
      'Set up two right triangles from one observation point',
      'Use tan at two different angles to find an unknown length',
      'Classic two-angle problem from NCERT Example 4',
    ],
  },
  shadow: {
    num: '04', title: "Sun's Shadow",
    story: "As the sun falls, shadows grow. At two different sun angles the shadow is 4 m longer. From that one difference, find the tower's full height.",
    learns: [
      'Write shadow-length equations at two sun angles',
      'Subtract to eliminate the unknown base distance',
      'Solve with 2√3 — NCERT Example 5',
    ],
  },
  twin: {
    num: '05', title: 'Twin Towers',
    story: "From the top of a 60 m tower, you look down at the building next to you. Two depression angles — one to the top, one to the bottom. Find its height.",
    learns: [
      'Angles of depression from a high point to a shorter building',
      'Find horizontal distance first using tan 60°',
      'Then compute the building height using tan 30°',
    ],
  },
  river: {
    num: 'BOSS', title: 'The River',
    story: "You stand on a 3 m bridge over a river. Lock two depression beams — one to each bank. From just those angles and your height, compute the full river width.",
    learns: [
      'Two-angle depression problem from one position',
      'Use tan to find each bank distance independently',
      'Add them — you just measured a river without crossing it',
    ],
  },
};

function App() {
  const [scene, setScene] = useState(() => localStorage.getItem('z.scene') || 'onboarding');
  const [player, setPlayer] = useState(() => JSON.parse(localStorage.getItem('z.player') || 'null') || { name: 'Aarav', intent: 'concept' });
  const [progress, setProgress] = useState({ confidence: 62, ch8: 2, ch9: 0 });
  const [activeMission, setActiveMission] = useState(null);
  const [activeChapter, setActiveChapter] = useState('ch8');
  const [showFeedback, setShowFeedback] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('z.scene', scene); }, [scene]);
  useEffect(() => { localStorage.setItem('z.player', JSON.stringify(player)); }, [player]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const handleNav = (id) => {
    const map = { home: 'lobby', world: 'worlds', raid: 'raid', progress: 'progress' };
    setScene(map[id] || id);
  };

  // Map mission kind → play scene, respecting the gameplay tweak for archer/lighthouse swap
  const getPlayScene = (kind) => {
    if (tweaks.gameplay === 'lighthouse' && (kind === 'archer' || kind === 'archer-intro')) return 'play-lighthouse';
    if (tweaks.gameplay === 'archer' && (kind === 'light' || kind === 'lighthouse')) return 'play-archer';
    const map = {
      anatomy: 'play-anatomy',
      'archer-intro': 'play-archer',
      archer: 'play-archer',
      angles: 'play-angles',
      decoder: 'play-decoder',
      identity: 'play-identity',
      proof: 'play-proof',
      'boss-trig': 'play-trig-boss',
      sight: 'play-sight',
      light: 'play-lighthouse',
      lighthouse: 'play-lighthouse',
      flag: 'play-flagstaff',
      shadow: 'play-shadow',
      twin: 'play-twin',
      river: 'play-river-boss',
    };
    return map[kind] || 'play-archer';
  };

  const startMission = (m) => {
    setActiveMission(m);
    setScene(getPlayScene(m.kind || 'archer'));
  };

  const finishMission = () => {
    setProgress(p => ({
      ...p,
      confidence: Math.min(100, p.confidence + 4),
      [activeChapter]: Math.min(activeChapter === 'ch9' ? 6 : 8, (p[activeChapter] || 0) + 1),
    }));
    setShowFeedback(true);
    setScene(activeChapter === 'ch9' ? 'world-ch9' : 'world-ch8');
  };

  const getMissionIntroData = (m) => {
    const s = MISSION_STORIES[m.kind] || MISSION_STORIES.archer;
    return { ...s, title: m.title || s.title };
  };

  const backFromWorldMap = () => setScene('worlds');

  return (
    <div className="stage">
      <div className="phone">
        <div className="screen">

          {scene === 'onboarding' && (
            <OnboardingScene tweaks={tweaks} onDone={(p) => { setPlayer(p); setScene('lobby'); }}/>
          )}

          {scene === 'lobby' && (
            <LobbyScene player={player} progress={progress}
              onNav={handleNav}
              onEnterWorld={() => setScene('worlds')}
              onMultiplayer={() => setScene('raid')}/>
          )}

          {scene === 'worlds' && (
            <WorldsScene progress={progress}
              onBack={() => setScene('lobby')}
              onNav={handleNav}
              onPickWorld={(wid) => {
                setActiveChapter(wid);
                setScene('world-' + wid);
              }}/>
          )}

          {(scene === 'world-ch8' || scene === 'world-ch9') && (
            <WorldMap
              chapter={scene === 'world-ch9' ? 'ch9' : 'ch8'}
              onBack={backFromWorldMap}
              onNav={handleNav}
              onEnterMission={(m) => {
                setActiveMission(m);
                setScene('mission-intro');
              }}/>
          )}

          {scene === 'mission-intro' && activeMission && (() => {
            const mi = getMissionIntroData(activeMission);
            return (
              <MissionIntro
                mission={mi}
                onBack={() => setScene(activeChapter === 'ch9' ? 'world-ch9' : 'world-ch8')}
                onStart={() => startMission(activeMission)}/>
            );
          })()}

          {scene === 'play-archer' && (
            <ArcherMission tweaks={tweaks} onDone={finishMission}/>
          )}
          {scene === 'play-lighthouse' && (
            <LighthouseMission tweaks={tweaks} onDone={finishMission}/>
          )}
          {scene === 'play-anatomy' && (
            <AnatomyMission onDone={finishMission}/>
          )}
          {scene === 'play-angles' && (
            <AnglesMission onDone={finishMission}/>
          )}
          {scene === 'play-decoder' && (
            <DecoderMission onDone={finishMission}/>
          )}
          {scene === 'play-identity' && (
            <IdentityMission onDone={finishMission}/>
          )}
          {scene === 'play-proof' && (
            <ProofMission onDone={finishMission}/>
          )}
          {scene === 'play-trig-boss' && (
            <TrigBossMission onDone={finishMission}/>
          )}
          {scene === 'play-sight' && (
            <SightMission onDone={finishMission}/>
          )}
          {scene === 'play-flagstaff' && (
            <FlagstaffMission onDone={finishMission}/>
          )}
          {scene === 'play-shadow' && (
            <ShadowMission onDone={finishMission}/>
          )}
          {scene === 'play-twin' && (
            <TwinMission onDone={finishMission}/>
          )}
          {scene === 'play-river-boss' && (
            <RiverBossMission onDone={finishMission}/>
          )}

          {scene === 'raid' && (
            <RaidScene onBack={() => setScene('lobby')} onNav={handleNav}/>
          )}
          {scene === 'progress' && (
            <ProgressScene progress={progress} onBack={() => setScene('lobby')} onNav={handleNav}/>
          )}

          <FeedbackSheet show={showFeedback} onClose={() => setShowFeedback(false)} onSubmit={() => {}}/>

          <div className="home-ind"/>
        </div>
      </div>

      {editMode && (
        <div className="tweaks-panel">
          <div className="row between" style={{ marginBottom: 14 }}>
            <h4>Tweaks</h4>
            <span className="mono" style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>LIVE</span>
          </div>

          <div className="group">
            <label>Gameplay for this concept</label>
            <div className="opts">
              {['archer', 'lighthouse'].map(k => (
                <button key={k} className={tweaks.gameplay === k ? 'on' : ''}
                  onClick={() => updateTweak('gameplay', k)}>
                  {k === 'archer' ? '🏹 Archer' : '🗼 Lighthouse'}
                </button>
              ))}
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginTop: 6 }}>
              Same concept (sin/cos/tan), two different mechanics.
            </div>
          </div>

          <div className="group">
            <label>Invisible AI nudges</label>
            <div className="opts">
              <button className={tweaks.adaptive ? 'on' : ''} onClick={() => updateTweak('adaptive', true)}>On</button>
              <button className={!tweaks.adaptive ? 'on' : ''} onClick={() => updateTweak('adaptive', false)}>Off</button>
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginTop: 6 }}>
              After 2 near-misses, the game quietly offers a hint.
            </div>
          </div>

          <div className="group">
            <label>Coach tone</label>
            <div className="opts">
              {[['coach','Coach'], ['hype','Hype'], ['narrator','Narrator']].map(([k,l]) => (
                <button key={k} className={tweaks.tone === k ? 'on' : ''} onClick={() => updateTweak('tone', k)}>{l}</button>
              ))}
            </div>
          </div>

          <div className="group">
            <label>Jump to</label>
            <div className="opts">
              {[
                'onboarding','lobby','worlds','world-ch8','world-ch9','mission-intro',
                'play-archer','play-lighthouse','play-anatomy','play-angles','play-decoder',
                'play-identity','play-proof','play-trig-boss',
                'play-sight','play-flagstaff','play-shadow','play-twin','play-river-boss',
                'raid','progress',
              ].map(s => (
                <button key={s} className={scene === s ? 'on' : ''} onClick={() => {
                  if (s === 'mission-intro') {
                    setActiveMission({ title: "Archer's Angle", kind: 'archer' });
                    setActiveChapter('ch8');
                  }
                  if (s === 'world-ch8') setActiveChapter('ch8');
                  if (s === 'world-ch9') setActiveChapter('ch9');
                  setScene(s);
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div className="group">
            <label>Feedback sheet</label>
            <div className="opts">
              <button onClick={() => setShowFeedback(true)}>Open pulse check</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

</body>
</html>
