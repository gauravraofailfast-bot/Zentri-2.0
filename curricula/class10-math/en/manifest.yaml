  cartographer:
    name: "Cartographer Pass"
    includes: ["*"]
    price_annual: 7999

# Audio & aesthetics
audio:
  ambient_bed_per_biome: true
  raag_style: "Bhairavi"
  language: hindi_classical
  composer_notes: "Blend sitar, bansuri, tabla, and tanpura with modern synthesis"

# References
references:
  ncert_chapter_8: "Introduction to Trigonometry"
  ncert_chapter_9: "Some Applications of Trigonometry"
  textbook_edition: "2024"

